name: Tests

on:
  pull_request:
    branches: [main, development]

jobs:
  test-fte-macos:
    name: "Test FluxTextEncoders (macOS)"
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Resolve dependencies
        run: xcodebuild -resolvePackageDependencies -scheme Flux2Swift-Package -clonedSourcePackagesDirPath .spm
      - name: Test FluxTextEncoders
        run: |
          xcodebuild test \
            -scheme Flux2Swift-Package \
            -destination 'platform=macOS,arch=arm64' \
            -skipPackagePluginValidation \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -clonedSourcePackagesDirPath .spm \
            -only-testing FluxTextEncodersTests

  test-f2c-macos:
    name: "Test Flux2Core — Config Only (macOS)"
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Resolve dependencies
        run: xcodebuild -resolvePackageDependencies -scheme Flux2Swift-Package -clonedSourcePackagesDirPath .spm
      - name: Test Flux2Core
        run: |
          xcodebuild test \
            -scheme Flux2Swift-Package \
            -destination 'platform=macOS,arch=arm64' \
            -skipPackagePluginValidation \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -clonedSourcePackagesDirPath .spm \
            -only-testing Flux2CoreTests
